<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
	<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
	
	<head>
		<meta charset="utf-8">
		<title>Ajout des Films</title>
	</head>
	
	<body>
		<div th:replace="template"></div>
		<div class="container mt-5">
			<div class="card">
				<div class="card-header" th:if="${mode=='new'}"> Ajout des Films </div> 
				<div class="card-header" th:if="${mode=='edit'}">Modification des Films </div>
				<div class="card-body">
					<form th:action="@{saveFilm}" method="post">
						
						<input hidden name="page" class="form-control" th:value="${page}"  /> 
						<input  hidden name="size" class="form-control" th:value="${size}"  /> 
						
						<div class="form-group"> 
							<label class="control-label" hidden>ID Film:</label>  
							<input type="hidden" name="idFilm" class="form-control" 
									th:value="${film.idFilm}"/> 
						</div> 
						<div class="form-group">
							<label class="control-label">Titre Film:</label> 
							<input type="text" name="nomFilm" class="form-control" 
									th:value="${film.nomFilm}"/>
							<span th:errors= ${film.nomFilm} class="text-danger"></span>
						</div>
						
						<div class="form-group"> 
						 <label class="control-label">Genre Film:</label>  
						 <select name="genre" class="form-control" 
						 		th:value="${film.genre.idGen}"  
						 		th:if="${!#strings.isEmpty(film.genre)}" >  
							 <option th:each="g:${genres}" th:if="${mode=='edit'}"  
							         th:value="${g.idGen}" th:text="${g.nomGen}" 
							    	 th:selected="${ g.idGen==film.genre.idGen}"> 
							 </option>     
						</select>  
						<select name="genre" class="form-control" 
						 th:if="${#strings.isEmpty(film.genre)}"> 
							 <option th:each="g:${genres}" th:value="${g.idGen}"  
							    th:text="${g.nomGen}"> 
							 </option> 
						 </select>  
						 </div>  
						
						<div class="form-group">
							<label class="control-label">Rating Film:</label>
							<input type="text" name="rateFilm" class="form-control" 
									th:value="${film.rateFilm}"/>
							<span th:errors= ${film.rateFilm} class="text-danger"></span> 
						</div>
						<div class="form-group">
							<label class="control-label">Date sortie :</label>
							<input type="date" name="dateSortie" class="form-control" 
									th:value="${film.dateSortie}"/>
							<span th:errors= ${film.dateSortie} class="text-danger"></span>
						</div>
						<div>
							<button type="submit" class="btn btn-primary">Valider</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
