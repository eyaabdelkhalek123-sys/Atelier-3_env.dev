<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
	<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
	
	<head>
		<meta charset="utf-8">
		<title>Ajout des Films</title>
	</head>
	
	<body>
		<div th:replace="template"></div>
		<div class="container mt-5">
			<div class="card">
				<div class="card-header" th:if="${mode=='new'}"> Ajout des Films </div> 
				<div class="card-header" th:if="${mode=='edit'}">Modification des Films </div>
				<div class="card-body">
					<!-- ✅ CODE CORRIGÉ -->

					<!-- ✅ th:object permet d'utiliser *{} dans tout le formulaire -->
					<form th:action="@{/saveFilm}" method="post" th:object="${film}">

					    <input hidden name="page" th:value="${page}" />
					    <input hidden name="size" th:value="${size}" />

					    <!-- th:field gère automatiquement name, id et value -->
					    <div class="form-group">
					        <input type="hidden" th:field="*{idFilm}" />
					    </div>

					    <div class="form-group">
					        <label>Titre Film:</label>
					        <input type="text" class="form-control" th:field="*{nomFilm}" />
					        <!-- ✅ Syntaxe correcte -->
					        <span th:if="${#fields.hasErrors('nomFilm')}"
					              th:errors="*{nomFilm}"
					              class="text-danger">
					        </span>
					    </div>

						<div class="form-group">
						    <label>Genre Film:</label>
						    <select name="genre.idGen" class="form-control">
						        <option th:each="g : ${genres}"
						                th:value="${g.idGen}"
						                th:text="${g.nomGen}"
						                th:selected="${film.genre != null and g.idGen == film.genre.idGen}">
						        </option>
						    </select>
						</div>

					    <div class="form-group">
					        <label>Rating Film:</label>
					        <input type="text" class="form-control" th:field="*{rateFilm}" />
					        <span th:if="${#fields.hasErrors('rateFilm')}"
					              th:errors="*{rateFilm}"
					              class="text-danger">
					        </span>
					    </div>

					    <div class="form-group">
					        <label>Date sortie:</label>
					        <input type="date" class="form-control" th:field="*{dateSortie}" />
					        <span th:if="${#fields.hasErrors('dateSortie')}"
					              th:errors="*{dateSortie}"
					              class="text-danger">
					        </span>
					    </div>

					    <button type="submit" class="btn btn-primary">Valider</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
